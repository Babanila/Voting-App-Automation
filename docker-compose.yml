# Ironhack note - This file is for running in docker compose with prebuilt images
# Use these if you're stuck, or if you want to start slowly migrating from external images into your own.

services:
  # Vote Service
  vote:
    image: babanila/vote:1.0
    depends_on:
      redis:
        condition: service_healthy 
    ports:
      - "8080:80"
    networks:
      - baba-net

  # Result Service
  result:
    image: babanila/result:1.0
    depends_on:
      db:
        condition: service_healthy 
    ports:
      - "8081:80"
    networks:
      - baba-net

  # Worker Service
  worker:
    image: babanila/worker:1.0
    depends_on:
      redis:
        condition: service_healthy 
      db:
        condition: service_healthy 
    networks:
      - baba-net

  # Redis Data Service
  redis:
    image: redis:alpine
    volumes:
      - "./healthchecks:/healthchecks"
    healthcheck:
      test: /healthchecks/redis.sh
      interval: "5s"
    networks:
      - baba-net

  # Database Service
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "postgres"
    volumes:
      - "db-data:/var/lib/postgresql/data"
      - "./healthchecks:/healthchecks"
    healthcheck:
      test: /healthchecks/postgres.sh
      interval: "5s"
    networks:
      - baba-net

volumes:
  db-data:

networks:
  baba-net:
